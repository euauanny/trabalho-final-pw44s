# Porta HTTP em que a API sera iniciada.
server.port=8080

# Banco H2 em memoria usado durante o desenvolvimento.
spring.datasource.generate-unique-name=false
spring.datasource.url=jdbc:h2:mem:testdb
# Disponibiliza a interface do banco em /h2-console.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Exibe no terminal os comandos SQL executados pelo Hibernate.
spring.jpa.show-sql=true

# Executa o import.sql e recria as tabelas sempre que a API inicia.
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=create-drop

